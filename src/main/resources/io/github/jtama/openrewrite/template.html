<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Aerial View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for webkit to keep the UI clean */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 20px;
        }

        /* D3 Specific Transitions */
        .node.fade, .links line.fade {
            opacity: 0.1;
        }

        /* Force hardware acceleration for smooth transitions */
        aside {
            will-change: transform;
        }
    </style>
</head>
<body class="bg-gray-50 overflow-hidden font-sans text-slate-800 h-screen w-screen relative">

<!-- Toggle Buttons -->
<button id="left-toggle-btn"
        class="fixed top-4 left-4 z-40 p-2.5 bg-white/90 backdrop-blur-sm rounded-full shadow-lg hover:bg-white hover:scale-105 transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-700"
        title="Open Settings">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
    </svg>
</button>

<button id="right-toggle-btn"
        class="fixed top-4 right-4 z-40 p-2.5 bg-white/90 backdrop-blur-sm rounded-full shadow-lg hover:bg-white hover:scale-105 transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-700"
        title="Open Legend">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z"/>
    </svg>
</button>

<!-- Left Sidebar: Filters (Default: Open) -->
<aside id="left-sidebar"
       class="fixed top-0 left-0 h-full w-80 bg-white/95 backdrop-blur-md shadow-2xl z-50 transform transition-transform duration-300 ease-in-out border-r border-slate-200 overflow-y-auto">
    <div class="p-6 space-y-6">
        <div class="flex items-center justify-between pb-4 border-b border-slate-200">
            <h2 class="text-xl font-bold text-slate-800 tracking-tight">Settings</h2>
            <button id="left-close-btn" class="p-1 rounded-md hover:bg-slate-100 text-slate-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Search -->
        <div class="space-y-2">
            <label for="search" class="block text-sm font-semibold text-slate-700">Search for class</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
                <input type="text" id="search" placeholder="Type to filter..."
                       class="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-shadow">
            </div>
        </div>

        <!-- Node Size -->
        <div class="space-y-2" id="size-chooser-container">
            <label for="size-chooser" class="block text-sm font-semibold text-slate-700">Node size metric</label>
            <select id="size-chooser"
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm bg-white">
                <option value="incoming" selected="selected">Incoming connections</option>
                <option value="outgoing">Outgoing connections</option>
            </select>
        </div>

        <!-- Node Color -->
        <div class="space-y-2" id="color-chooser-container">
            <label for="color-chooser" class="block text-sm font-semibold text-slate-700">Node color grouping</label>
            <select id="color-chooser"
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm bg-white">
                <option value="louvain" selected="selected">Louvain calculated community</option>
                <option value="artifactId">Project artifact ID</option>
            </select>
        </div>

        <!-- Weight Filter -->
        <div class="space-y-3 pt-2" id="weight-filter-container">
            <div class="flex justify-between items-center">
                <label for="weight-filter" class="block text-sm font-semibold text-slate-700">Max Node Size</label>
                <span id="weight-value"
                      class="inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-indigo-100 bg-indigo-600 rounded">100</span>
            </div>
            <input type="range" id="weight-filter" min="0" max="100" step="1"
                   class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600 hover:accent-indigo-700">
        </div>

        <!-- Repulsion Force Slider -->
        <div class="space-y-3 pt-2" id="repulsion-filter-container">
            <div class="flex justify-between items-center">
                <label for="repulsion-filter" class="block text-sm font-semibold text-slate-700">Repulsion Force</label>
                <span id="repulsion-value"
                      class="inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-indigo-100 bg-indigo-600 rounded">-50</span>
            </div>
            <input type="range" id="repulsion-filter" min="-200" max="0" step="1"
                   class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600 hover:accent-indigo-700">
        </div>

        <!-- Color Number -->
        <div class="space-y-3 pt-2" id="top-communities-number-container">
            <div class="flex justify-between items-center">
                <label for="top-communities-number" class="block text-sm font-semibold text-slate-700">Top Communities</label>
                <span id="top-communities-number-value"
                      class="inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-indigo-100 bg-indigo-600 rounded">100</span>
            </div>
            <input type="range" id="top-communities-number" min="0" max="30" step="1"
                   class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600 hover:accent-indigo-700">
        </div>
    </div>
</aside>

<!-- Right Sidebar: Legend (Default: Hidden) -->
<aside id="right-sidebar"
       class="fixed top-0 right-0 h-full w-72 bg-white/95 backdrop-blur-md shadow-2xl z-50 transform transition-transform duration-300 ease-in-out translate-x-full border-l border-slate-200 overflow-y-auto">
    <div class="p-6">
        <div class="flex items-center justify-between pb-4 border-b border-slate-200 mb-4">
            <h2 class="text-xl font-bold text-slate-800 tracking-tight">Legend</h2>
            <button id="right-close-btn" class="p-1 rounded-md hover:bg-slate-100 text-slate-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div id="legend-content" class="space-y-2">
            <!-- Legend items injected here by D3 -->
        </div>
    </div>
</aside>

<!-- Tabs Navigation -->
<div class="fixed top-4 left-1/2 transform -translate-x-1/2 z-40 bg-white/90 backdrop-blur-sm rounded-full shadow-lg p-1 flex space-x-1 border border-slate-200">
    <button id="tab-btn-graph" class="px-4 py-2 rounded-full text-sm font-semibold bg-indigo-600 text-white shadow transition-colors focus:outline-none">Graph View</button>
    <button id="tab-btn-table" class="px-4 py-2 rounded-full text-sm font-semibold text-slate-700 hover:bg-slate-100 transition-colors focus:outline-none">Data Table</button>
</div>

<!-- Tab Contents -->
<div id="tab-content-graph" class="absolute inset-0 w-full h-full">
    <!-- Graph Container -->
    <div id="graph-container" class="absolute inset-0 w-full h-full"></div>
</div>

<div id="tab-content-table" class="absolute inset-0 w-full h-full hidden bg-slate-50 pt-20 px-8 overflow-y-auto z-30">
    <div class="max-w-7xl mx-auto pb-12">
        <h2 class="text-2xl font-bold text-slate-800 mb-6">Method invocation count</h2>
        <div class="overflow-hidden bg-white shadow-sm ring-1 ring-slate-200 sm:rounded-lg">
            <div class="mx-auto flow-root max-w-7xl">
                <div class="-mx-4 -my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
                    <div class="inline-block min-w-full py-2 align-middle sm:px-6 lg:px-8">
                        <table class="min-w-full table-fixed text-sm bg-background divide-y divide-zinc-200" role="table">
                            <thead class="bg-zinc-100" role="rowgroup">
                            <tr role="row">
                                <th scope="col" class="px-3 py-3.5 font-medium text-left text-zinc-900 cursor-pointer hover:bg-zinc-200 transition-colors" id="th-name" aria-sort="ascending">
                                        <div class="inline-flex items-center gap-1 text-zinc-900">
                                            Method name
                                            <span id="sort-icon-name" class="w-4 h-4 inline-block"></span>
                                        </div>
                                    </th>
                                <th scope="col" class="px-3 py-3.5 font-medium text-left text-zinc-900 cursor-pointer hover:bg-zinc-200 transition-colors" id="th-count" aria-sort="none">
                                    <div class="inline-flex items-center gap-1 text-zinc-900">
                                        Invocation count
                                        <span id="sort-icon-count" class="w-4 h-4 inline-block"></span>
                                    </div>
                                </th>
                                <th scope="col" class="px-3 py-3.5 font-medium text-left text-zinc-900 cursor-pointer hover:bg-zinc-200 transition-colors" id="th-constructor" aria-sort="none">
                                    <div class="inline-flex items-center gap-1 text-zinc-900">
                                        Constructor ?
                                        <span id="sort-icon-constructor" class="w-4 h-4 inline-block"></span>
                                    </div>
                                </th>
                                </tr>
                                </thead>
                                <tbody class="divide-y divide-zinc-200 bg-white" role="rowgroup" id="invocation-table-body">
                                </tbody>
                            </table>
                        </div>
                    </div>
            </div>
        </div>
    </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script type="module">
    import jLouvain from 'https://cdn.jsdelivr.net/npm/jlouvain@2.0.0/+esm'

    // --- UI Interactions ---
    const leftSidebar = document.getElementById('left-sidebar');
    const rightSidebar = document.getElementById('right-sidebar');
    const rightToggleBtn = document.getElementById('right-toggle-btn');

    // Mobile/Init check: On very small screens, maybe start closed? Keeping strict "Left Open" for now per plan.

    document.getElementById('left-toggle-btn').addEventListener('click', () => {
        leftSidebar.classList.remove('-translate-x-full');
    });

    document.getElementById('left-close-btn').addEventListener('click', () => {
        leftSidebar.classList.add('-translate-x-full');
    });

    document.getElementById('right-toggle-btn').addEventListener('click', () => {
        rightSidebar.classList.remove('translate-x-full');
    });

    document.getElementById('right-close-btn').addEventListener('click', () => {
        rightSidebar.classList.add('translate-x-full');
    });

    // --- Tab Switching Logic ---
    const tabBtnGraph = document.getElementById('tab-btn-graph');
    const tabBtnTable = document.getElementById('tab-btn-table');
    const tabContentGraph = document.getElementById('tab-content-graph');
    const tabContentTable = document.getElementById('tab-content-table');

    // --- Filter containers ---
    const sizeChooserContainer = document.getElementById('size-chooser-container');
    const colorChooserContainer = document.getElementById('color-chooser-container');
    const weightFilterContainer = document.getElementById('weight-filter-container');
    const topCommunitiesNumberContainer = document.getElementById('top-communities-number-container');

    // @formatter:off
    let invocationData;
    try {
        const invocationCountPlaceholder = '{{ invocationCount }}';
        if (invocationCountPlaceholder === '[]') {
            // Placeholder was not replaced, set empty array
            invocationData = [];
        } else {
            invocationData = JSON.parse(invocationCountPlaceholder);
        }
    } catch (e) {
        console.error("Failed to parse invocationCount:", e);
        invocationData = [];
    }

    if (invocationData.length === 0) {
        tabBtnTable.style.display = 'none';
        tabContentTable.classList.add('hidden');
        tabBtnGraph.className = 'px-4 py-2 rounded-full text-sm font-semibold bg-indigo-600 text-white shadow transition-colors focus:outline-none';
        tabContentGraph.classList.remove('hidden');
    }


    // @formatter:on

    let sortKey = 'count';
    let sortDir = 'desc';
    let maxCount;

    const invocationTableBody = document.getElementById('invocation-table-body');
    const sortIconName = document.getElementById('sort-icon-name');
    const sortIconCount = document.getElementById('sort-icon-count');
    const sortIconConstructor = document.getElementById('sort-icon-constructor');
    const thName = document.getElementById('th-name');
    const thCount = document.getElementById('th-count');
    const thConstructor = document.getElementById('th-constructor');

    const iconUp = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler-chevron-up size-4"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M6 15l6 -6l6 6"></path></svg>`;
    const iconDown = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler-chevron-down size-4"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M6 9l6 6l6 -6"></path></svg>`;

    function renderInvocationTable(searchTerm = '') {
        if (!invocationTableBody) return;
        
        let filteredData = invocationData;
        if (searchTerm) {
            filteredData = invocationData.filter(row => String(row.methodName || row.name).toLowerCase().includes(searchTerm));
        }

        const sortedData = [...filteredData].sort((a, b) => {
            let valA = a[sortKey];
            let valB = b[sortKey];
            
            let cmp = 0;
            if (typeof valA === 'number' && typeof valB === 'number') {
                cmp = valA - valB;
            } else {
                cmp = String(valA).localeCompare(String(valB));
            }
            
            return sortDir === 'asc' ? cmp : -cmp;
        });

        if (!maxCount) {
            maxCount = sortedData.length > 0 ? sortedData[0].count : 1; // Default to 1 to prevent division by zero if no data
        }


        invocationTableBody.innerHTML = '';
        sortedData.forEach(row => {
            const tr = document.createElement('tr');
            tr.className = 'even:bg-zinc-50 border-b border-zinc-200 last:border-0';

            const countRatio = row.count / maxCount;

            const cellStyle = `color: hsl(from hsl(240, 5%, 26%) h s calc( (${countRatio}) * 100));background-color: rgb(from darkred r g b / ${countRatio})`;

            const methodTd = document.createElement('td');
            methodTd.className = 'whitespace-normal break-all px-3 py-4 text-sm text-zinc-900';
            methodTd.setAttribute('style', cellStyle);
            // Use textContent to ensure HTML special chars are rendered as plain text.
            methodTd.textContent = row.methodName;

            const countTd = document.createElement('td');
            countTd.className = 'whitespace-nowrap px-3 py-4 text-sm text-zinc-900';
            countTd.setAttribute('style', cellStyle);
            countTd.textContent = String(row.count);

            const constructorTd = document.createElement('td');
            constructorTd.className = 'whitespace-nowrap px-3 py-4 text-sm text-zinc-900';
            constructorTd.setAttribute('style', cellStyle);
            constructorTd.textContent = String(row.constructor);

            tr.appendChild(methodTd);
            tr.appendChild(countTd);
            tr.appendChild(constructorTd);
            invocationTableBody.appendChild(tr);
        });

        if (sortIconName) sortIconName.innerHTML = sortKey === 'methodName' ? (sortDir === 'asc' ? iconUp : iconDown) : '';
        if (sortIconCount) sortIconCount.innerHTML = sortKey === 'count' ? (sortDir === 'asc' ? iconUp : iconDown) : '';
        if (sortIconConstructor) sortIconConstructor.innerHTML = sortKey === 'constructor' ? (sortDir === 'asc' ? iconUp : iconDown) : '';
        
        if (thName) thName.setAttribute('aria-sort', sortKey === 'methodName' ? (sortDir === 'asc' ? 'ascending' : 'descending') : 'none');
        if (thCount) thCount.setAttribute('aria-sort', sortKey === 'count' ? (sortDir === 'asc' ? 'ascending' : 'descending') : 'none');
        if (thConstructor) thConstructor.setAttribute('aria-sort', sortKey === 'constructor' ? (sortDir === 'asc' ? 'ascending' : 'descending') : 'none');
    }

    if (thName) thName.addEventListener('click', () => setSort('methodName'));
    if (thCount) thCount.addEventListener('click', () => setSort('count'));
    if (thConstructor) thConstructor.addEventListener('click', () => setSort('constructor'));

    function setSort(key) {
        if (sortKey === key) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortKey = key;
            sortDir = 'asc';
        }
        const searchInput = document.getElementById('search');
        renderInvocationTable(searchInput ? searchInput.value.toLowerCase() : '');
    }

    // Initial render
    renderInvocationTable();

    function switchTab(tab) {
        if (tab === 'graph') {
            tabBtnGraph.className = 'px-4 py-2 rounded-full text-sm font-semibold bg-indigo-600 text-white shadow transition-colors focus:outline-none';
            tabBtnTable.className = 'px-4 py-2 rounded-full text-sm font-semibold text-slate-700 hover:bg-slate-100 transition-colors focus:outline-none';
            tabContentGraph.classList.remove('hidden');
            tabContentTable.classList.add('hidden');
            rightToggleBtn.classList.remove('hidden');
            sizeChooserContainer.classList.remove('hidden');
            colorChooserContainer.classList.remove('hidden');
            weightFilterContainer.classList.remove('hidden');
            topCommunitiesNumberContainer.classList.remove('hidden');
        } else {
            tabBtnTable.className = 'px-4 py-2 rounded-full text-sm font-semibold bg-indigo-600 text-white shadow transition-colors focus:outline-none';
            tabBtnGraph.className = 'px-4 py-2 rounded-full text-sm font-semibold text-slate-700 hover:bg-slate-100 transition-colors focus:outline-none';
            tabContentTable.classList.remove('hidden');
            tabContentGraph.classList.add('hidden');
            rightSidebar.classList.add('translate-x-full');
            rightToggleBtn.classList.add('hidden');
            sizeChooserContainer.classList.add('hidden');
            colorChooserContainer.classList.add('hidden');
            weightFilterContainer.classList.add('hidden');
            topCommunitiesNumberContainer.classList.add('hidden');
        }
    }

    tabBtnGraph.addEventListener('click', () => switchTab('graph'));
    tabBtnTable.addEventListener('click', () => switchTab('table'));

    // @formatter:off
    // This is for templating replacement...
    let originalGraphData;
    try {
        const graphDataPlaceholder = '{{ graphData }}';
        if (graphDataPlaceholder === '[]') {
            // Placeholder was not replaced, set empty graph data
            originalGraphData = { nodes: [], links: [] };
        } else {
            originalGraphData = JSON.parse(graphDataPlaceholder);
        }
    } catch (e) {
        console.error("Failed to parse graphData:", e);
        originalGraphData = { nodes: [], links: [] };
    }

    if (originalGraphData.nodes.length === 0) {
        tabBtnGraph.style.display = 'none';
        tabContentTable.classList.remove('hidden');
        tabContentGraph.classList.add('hidden');
        sizeChooserContainer.classList.add('hidden');
        colorChooserContainer.classList.add('hidden');
        weightFilterContainer.classList.add('hidden');
        topCommunitiesNumberContainer.classList.add('hidden');
    }

    // @formatter:on
    let currentNodes = originalGraphData.nodes;
    let currentLinks = originalGraphData.links.map(l => ({
        ...l,
        source: currentNodes.find(n => n.className === l.source),
        target: currentNodes.find(n => n.className === l.target),
    }));

    let color;
    let communityCenters = {};

    let width = window.innerWidth;
    let height = window.innerHeight;

    // Tooltip (Styled with Tailwind classes via d3 attrs)
    const tooltip = d3.select("body").append("div")
        .attr("class", "absolute z-50 p-3 text-sm font-medium text-white bg-slate-800 rounded-lg shadow-xl pointer-events-none opacity-0 transition-opacity duration-200 border border-slate-700 max-w-xs break-words");

    // Legend Container (Select existing)
    const legendContainer = d3.select("#legend-content");

    const simulation = d3.forceSimulation()
        .force("link", d3.forceLink().id(d => d.className).distance(100))
        .force("charge", d3.forceManyBody().strength(-50))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("x", d3.forceX(d => communityCenters[d.community]?.x || width / 2).strength(0.05))
        .force("y", d3.forceY(d => communityCenters[d.community]?.y || height / 2).strength(0.05));

    // SVG appended to specific container
    const svg = d3.select("#graph-container").append("svg")
        .attr("width", width)
        .attr("height", height)
        .attr("class", "w-full h-full"); // Responsive SVG

    const defs = svg.append("defs");
    const allGradients = [];

    const gContainer = svg.append("g")
        .attr("class", "zoom-container");

    let allLinks = gContainer.append("g")
        .attr("class", "links")
        .selectAll("line");

    let allNodes = gContainer.append("g")
        .attr("class", "nodes")
        .selectAll("circle");

    let selectedNode = null;
    let sizeExtractor = node => node.incomingConnections;
    let communityMethod = 'louvain';
    let myZoom = d3.zoom().on('zoom', handleZoom);

    initZoom();

    // --- Dynamic Range Slider Setup ---
    const allSizes = originalGraphData.nodes.map(d => d.incomingConnections).sort((a, b) => a - b);
    const minSize = allSizes[0] || 0;
    const maxSize = allSizes[allSizes.length - 1] || 100;

    const allColors = [
        '#e6194b', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4',
        '#46f0f0', '#f032e6', '#bcf60c', '#fabebe', '#008080', '#e6beff',
        '#9a6324', '#fffac8', '#800000', '#aaffc3', '#808000', '#ffd8b1',
        '#000075', '#808080', '#ffffff', '#000000'
    ];

    const weightSlider = d3.select("#weight-filter");
    const sizeChooser = d3.select("#size-chooser");
    const community = d3.select("#color-chooser");
    const weightValueSpan = d3.select("#weight-value");

    weightSlider
        .attr("min", minSize)
        .attr("max", maxSize)
        .attr("value", maxSize);
    weightValueSpan.text(maxSize);

    const topCommunitiesSlider = d3.select("#top-communities-number");
    const topCommunitiesValueSpan = d3.select("#top-communities-number-value");
    topCommunitiesSlider
        .attr("min", 5)
        .attr("max", 30)
        .attr("value", 30);
    topCommunitiesValueSpan.text(30);

    const repulsionSlider = d3.select("#repulsion-filter");
    const repulsionValueSpan = d3.select("#repulsion-value");
    repulsionSlider
        .attr("min", -200)
        .attr("max", 0)
        .attr("value", -50);
    repulsionValueSpan.text(-50);

    let lastCommunityMethod = null;

    function applyFilters() {
        const searchTerm = d3.select("#search").node().value.toLowerCase();
        const sizeOption = sizeChooser.node().value;
        communityMethod = community.node().value;
        const maxWeight = +weightSlider.node().value;
        const topCommunitiesValue = +topCommunitiesSlider.node().value;

        if (sizeOption === "incoming") {
            sizeExtractor = node => node.incomingConnections;
        } else {
            sizeExtractor = node => node.outgoingConnections;
        }

        if (communityMethod !== lastCommunityMethod) {
            if (communityMethod === 'louvain') {
                const nodeData = originalGraphData.nodes.map(d => d.className);
                const linkData = originalGraphData.links.map(l => ({
                    source: l.source,
                    target: l.target,
                    weight: l.weight || 1
                }));
                if (nodeData.length > 0) {
                    const communityFunc = jLouvain.jLouvain().nodes(nodeData).edges(linkData);
                    const communityResult = communityFunc();
                    originalGraphData.nodes.forEach(node => {
                        node.community = communityResult ? communityResult[node.className] : 0;
                    });
                }
            } else {
                originalGraphData.nodes.forEach(node => {
                    node.community = node.artifactId;
                });
            }
            lastCommunityMethod = communityMethod;
        }

        let allCommunities = originalGraphData.nodes.reduce((acc, item) => {
            acc[item.community] = acc[item.community] || {community: item.community, weight: 0};
            acc[item.community].weight++;
            return acc;
        }, {});

        let sortedCommunities = Object.values(allCommunities).sort((a, b) => b.weight - a.weight);
        const topCommunities = new Set(sortedCommunities.slice(0, topCommunitiesValue).map(c => c.community));

        const filteredNodes = originalGraphData.nodes.filter(n => {
            return sizeExtractor(n) <= maxWeight && topCommunities.has(n.community);
        });

        const filteredNodeIds = new Set(filteredNodes.map(n => n.className));
        const filteredLinks = originalGraphData.links
            .filter(l => filteredNodeIds.has(l.source) && filteredNodeIds.has(l.target))
            .map(l => ({
                ...l,
                source: filteredNodes.find(n => n.className === l.source),
                target: filteredNodes.find(n => n.className === l.target),
            }));

        currentNodes = filteredNodes;
        currentLinks = filteredLinks;

        updateLegend(currentNodes);
        updateVisualization();

        allNodes.style("opacity", n => n.className.toLowerCase().includes(searchTerm) ? 1 : 0.1);
        allLinks.style("opacity", l => l.source.className.toLowerCase().includes(searchTerm) || l.target.className.toLowerCase().includes(searchTerm) ? 1 : 0.1);

        if (!tabContentTable.classList.contains('hidden')) {
            renderInvocationTable(searchTerm);
        }
    }

    d3.select("#search").on("input", applyFilters);
    sizeChooser.on("input", applyFilters);
    community.on("input", applyFilters);
    weightSlider.on("input", function () {
        weightValueSpan.text(this.value);
        applyFilters();
    });
    topCommunitiesSlider.on("input", function () {
        topCommunitiesValueSpan.text(this.value);
        applyFilters();
    });

    repulsionSlider.on("input", function () {
        repulsionValueSpan.text(this.value);
        simulation.force("charge").strength(this.value);
        simulation.alpha(1).restart(); // Restart simulation to apply new force immediately
    });


    function clickHandler(event, d) {
        if (selectedNode === d) {
            selectedNode = null;
            allLinks.classed('fade', false);
        } else {
            selectedNode = d;
            const linkedNodes = new Set();
            linkedNodes.add(d.className);
            currentLinks.forEach(l => {
                if (l.source === d.className) linkedNodes.add(l.target);
                if (l.target === d.className) linkedNodes.add(l.source);
            });
            allLinks.classed('fade', l => l.source !== d.className && l.target !== d.className);
        }
    }

    function dblClickHandler(event, d) {
        if (d.fx === null) {
            d.fx = d.x;
            d.fy = d.y;
        } else {
            d.fx = null;
            d.fy = null;
        }
    }

    applyFilters();

    function getColor(d) {
        return color[d.community] ? color[d.community].color : '#9E9E9E';
    }

    function updateLegend(nodes) {
        let allCommunities = nodes.reduce((acc, item) => {
            acc[item.community] = acc[item.community] || {community: item.community, weight: 0};
            acc[item.community].weight++;
            return acc;
        }, {});

        allCommunities = Object.values(allCommunities);
        allCommunities.sort((a, b) => b.weight - a.weight);

        color = allCommunities.reduce((map, item, index) => {
            map[item.community] = {item, color: allColors[index] || '#9E9E9E'};
            return map;
        }, {});

        legendContainer.selectAll("*").remove();

        // Tailwind styled legend items
        const legendItems = legendContainer.selectAll(".legend-item")
            .data(allCommunities)
            .enter().append("div")
            .attr("class", "flex items-center space-x-3 p-1 hover:bg-slate-50 rounded transition-colors");

        legendItems.append("div")
            .attr("class", "w-4 h-4 rounded shadow-sm flex-shrink-0")
            .style("background-color", d => getColor(d));

        legendItems.append("input")
            .attr("type", "checkbox")
            .attr("class", "form-checkbox h-4 w-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500 cursor-pointer")
            .attr("checked", true)
            .on("change", (event, d) => {
                const visible = event.target.checked;
                d3.selectAll(".nodes circle").filter(n => n.community === d.community).style("display", visible ? "block" : "none");
            });

        legendItems.append("span")
            .attr("class", "text-sm text-slate-700 truncate")
            .attr("title", d => `Community ${d.community}`)
            .text(d => `Community ${d.community}`);
    }

    function updateVisualization() {
        if (!tabContentTable.classList.contains('hidden')) {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            renderInvocationTable(searchTerm);
        }
        allGradients.length = 0;
        defs.selectChildren().remove();
        // Update nodes
        allNodes = allNodes
            .data(currentNodes, d => d.className)
            .join(
                enter => enter.append("circle")
                    .attr("r", d => 5 + sizeExtractor(d) / 2)
                    .attr("stroke", "#fff")
                    .attr("stroke-width", 1.5)
                    .attr("cursor", "pointer")
                    .call(d3.drag()
                        .on("start", dragstarted)
                        .on("drag", dragged)
                        .on("end", dragended))
                    .on("mouseover", function (event, d) {
                        d3.select(this).attr("stroke", "#000").attr("stroke-width", 2);
                        tooltip.style("opacity", 1);
                        tooltip.html(`<div class="font-bold border-b border-slate-600 pb-1 mb-1">${d.className}</div>
                                          <div><span class="text-slate-300">Community:</span> ${d.community} <span class="text-slate-300">In:</span> ${d.incomingConnections} <span class="mx-1">|</span> <span class="text-slate-300">Out:</span> ${d.outgoingConnections}</div>`)
                            .style("left", (event.pageX + 15) + "px")
                            .style("top", (event.pageY - 28) + "px");
                    })
                    .on("mousemove", function (event) { // Keep tooltip moving with mouse
                        tooltip
                            .style("left", (event.pageX + 15) + "px")
                            .style("top", (event.pageY - 28) + "px");
                    })
                    .on("mouseout", function (d) {
                        d3.select(this).attr("stroke", "#fff").attr("stroke-width", 1.5);
                        tooltip.style("opacity", 0);
                    })
                    .on('click', clickHandler)
                    .on('dblclick', dblClickHandler),
                update => update,
                exit => exit.remove()
            )
            .attr("fill", d => getColor(d));

        // Update links
        allLinks = allLinks
            .data(currentLinks, d => `${d.source}-${d.target}`)
            .join(
                enter => enter.append("line")
                    .attr("stroke-width", d => 1 + Math.sqrt(d.weight))
                    .attr("stroke-opacity", 0.6)
                    .on("mouseover", function (event, d) {
                        tooltip.style("opacity", 1);
                        tooltip.html(`<div class="font-bold text-indigo-300">Link</div>
                                           <div><span class="text-slate-300">Source:</span> ${d.source.className}</div>
                                           <div><span class="text-slate-300">Target:</span> ${d.target.className}</div>
                                           <div class="mt-1 pt-1 border-t border-slate-600"><span class="text-slate-300">Weight:</span> ${d.weight}</div>`)
                            .style("left", (event.pageX + 15) + "px")
                            .style("top", (event.pageY - 28) + "px");
                    })
                    .on("mousemove", function (event) {
                        tooltip
                            .style("left", (event.pageX + 15) + "px")
                            .style("top", (event.pageY - 28) + "px");
                    })
                    .on("mouseout", function (d) {
                        tooltip.style("opacity", 0);
                    }),
                update => update,
                exit => exit.remove()
            )
            .attr("stroke", d => {
                const sourceNode = currentNodes.find(n => n.className === d.source.className);
                const targetNode = currentNodes.find(n => n.className === d.target.className);
                if (!sourceNode || !targetNode) return "#ccc";

                const id = `gradient-${sourceNode.community}-${targetNode.community}`.replace(/[^a-zA-Z0-9]/g, "-");
                if (!allGradients.some(item => item.attr('id') === id)) {
                    const gradient = defs.append("linearGradient")
                        .attr("id", id)
                        .attr("x1", "0%").attr("y1", "0%").attr("x2", "100%").attr("y2", "0%");
                    gradient.append("stop").attr("offset", "0%").attr("stop-color", getColor(sourceNode));
                    gradient.append("stop").attr("offset", "100%").attr("stop-color", getColor(targetNode));
                    allGradients.push(gradient);
                }
                return `url(#${id})`;
            });

        simulation.nodes(currentNodes)
        simulation.force("link").links(currentLinks)
        simulation.alpha(1).restart();
        simulation.on("tick", ticked);
    }

    function ticked() {
        allNodes
            .attr("r", d => 5 + sizeExtractor(d) / 2)
            .attr("cx", d => d.x)
            .attr("cy", d => d.y);

        allLinks
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);
    }

    function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
    }

    function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
    }

    function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
    }

    function handleZoom(e) {
        gContainer.attr('transform', e.transform);
    }

    function initZoom() {
        svg.call(myZoom);
    }

    window.addEventListener('resize', () => {
        width = window.innerWidth;
        height = window.innerHeight;

        svg.attr("width", width).attr("height", height);

        simulation.force("center", d3.forceCenter(width / 2, height / 2));
        simulation.force("x", d3.forceX(d => communityCenters[d.community]?.x || width / 2).strength(0.05));
        simulation.force("y", d3.forceY(d => communityCenters[d.community]?.y || height / 2).strength(0.05));

        simulation.alpha(0.3).restart();
    });
</script>
</body>
</html>
