name: Build PR Preview

on:
  pull_request:
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - '*.adoc'
      - '*.txt'
      - '.all-contributorsrc'
jobs:
  build-artefact:
    name: Build artefact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: 'maven'
      - name: Build project
        run: mvn -B clean verify
      - name: Generate Class Diagram
        run: mvn -U org.openrewrite.maven:rewrite-maven-plugin:run -Drewrite.recipeArtifactCoordinates=io.github.jtama:project-graph-generator:999-SNAPSHOT -Drewrite.activeRecipes=io.github.jtama.openrewrite.ProjectAerialViewGenerator
      - name: Upload Class Diagram artifact
        uses: actions/upload-artifact@v4
        with:
          name: class-diagram-html
          path: class-diagram.html
