name: Deploy PR Preview

on:
  workflow_run:
    workflows: ["Build PR Preview"]
    types: [completed]

jobs:
  deploy-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }} # Checkout the correct commit from the workflow_run

      - name: Download Class Diagram artifact
        uses: actions/download-artifact@v4
        with:
          name: class-diagram-html
          path: . # Download to the root of the workspace

      - name: Define Surge Domain
        id: surge_domain
        run: |
          PR_NUMBER=${{ github.event.workflow_run.pull_requests[0].number }}
          SURGE_DOMAIN="pr-$PR_NUMBER-.project-graph-generator-preview.surge.sh"
          echo "SURGE_DOMAIN=$SURGE_DOMAIN" >> $GITHUB_OUTPUT

      - name: Deploy to Surge
        run: npx surge ./class-diagram.html https://${{ steps.surge_domain.outputs.SURGE_DOMAIN }} --token ${{ secrets.SURGE_TOKEN }}

      - name: Update PR status comment on success
        uses: quarkusio/action-helpers@main
        with:
          action: maintain-one-comment
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.workflow_run.pull_requests[0].number }}
          body: |
            🚀 PR Preview for **blog** ${{ github.sha }} has been successfully built!
            * https://${{ steps.surge_domain.outputs.SURGE_DOMAIN }}
          body-marker: <!-- Preview status comment marker -->
      - name: Update PR status comment on failure
        uses: quarkusio/action-helpers@main
        if: ${{ failure() }}
        with:
          action: maintain-one-comment
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.workflow_run.pull_requests[0].number }}
          body: |
            😭 Deploy PR Preview failed.
          body-marker: <!-- Preview status comment marker -->